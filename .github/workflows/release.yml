name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            deb_arch: amd64
            appimage_arch: x86_64
            tarball_suffix: x86_64
            appimagetool: appimagetool-x86_64.AppImage
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            deb_arch: arm64
            appimage_arch: aarch64
            tarball_suffix: aarch64
            appimagetool: appimagetool-aarch64.AppImage

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxft-dev libxinerama-dev \
            libxcursor-dev libxrender-dev libxfixes-dev \
            libpango1.0-dev libgl1-mesa-dev libegl1-mesa-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libdbus-1-dev libpulse-dev libfontconfig-dev \
            libfreetype6-dev libssl-dev libfuse2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: |
          echo "1.0.0" > .tag
          cargo build --release --target ${{ matrix.target }} -p terminux-gui -p terminux
          strip target/${{ matrix.target }}/release/terminux
          strip target/${{ matrix.target }}/release/terminux-gui

      - name: Build .deb package
        run: |
          ARCH=${{ matrix.deb_arch }} ./packaging/debian/build-deb.sh

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/${{ matrix.appimagetool }}
          chmod +x ${{ matrix.appimagetool }}
          export ARCH=${{ matrix.appimage_arch }}
          export VERSION=1.0.0
          ./packaging/appimage/build-appimage.sh

      - name: Create tarball
        run: |
          mkdir -p dist/terminux-linux-${{ matrix.tarball_suffix }}
          cp target/${{ matrix.target }}/release/terminux dist/terminux-linux-${{ matrix.tarball_suffix }}/
          cp target/${{ matrix.target }}/release/terminux-gui dist/terminux-linux-${{ matrix.tarball_suffix }}/
          cp README.md dist/terminux-linux-${{ matrix.tarball_suffix }}/
          cp -r terminux/docs dist/terminux-linux-${{ matrix.tarball_suffix }}/docs
          cp -r assets/icon dist/terminux-linux-${{ matrix.tarball_suffix }}/icons
          cd dist
          tar czf terminux-linux-${{ matrix.tarball_suffix }}.tar.gz terminux-linux-${{ matrix.tarball_suffix }}/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.AppImage *.deb >> SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terminux-${{ matrix.arch }}
          path: dist/
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Consolidate release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release/ \;

      - name: Generate combined checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Terminux ${{ github.ref_name }}
          body_path: .github/RELEASE_TEMPLATE.md
          draft: false
          prerelease: false
          files: release/*
