name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxft-dev libxinerama-dev \
            libxcursor-dev libxrender-dev libxfixes-dev \
            libpango1.0-dev libgl1-mesa-dev libegl1-mesa-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libdbus-1-dev libpulse-dev libfontconfig-dev \
            libfreetype6-dev libssl-dev libfuse2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: |
          echo "1.0.0" > .tag
          cargo build --release -p terminux-gui -p terminux
          strip target/release/terminux
          strip target/release/terminux-gui

      - name: Build .deb package
        run: |
          ./packaging/debian/build-deb.sh

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          export ARCH=x86_64
          export VERSION=1.0.0
          ./packaging/appimage/build-appimage.sh

      - name: Create tarball
        run: |
          mkdir -p dist/terminux-linux-x86_64
          cp target/release/terminux dist/terminux-linux-x86_64/
          cp target/release/terminux-gui dist/terminux-linux-x86_64/
          cp README.md dist/terminux-linux-x86_64/
          cp -r terminux/docs dist/terminux-linux-x86_64/docs
          cp -r assets/icon dist/terminux-linux-x86_64/icons
          cd dist
          tar czf terminux-linux-x86_64.tar.gz terminux-linux-x86_64/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.AppImage *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Terminux ${{ github.ref_name }}
          body_path: .github/RELEASE_TEMPLATE.md
          draft: false
          prerelease: false
          files: |
            dist/terminux-linux-x86_64.tar.gz
            dist/Terminux-1.0.0-x86_64.AppImage
            dist/terminux_1.0.0_amd64.deb
            dist/SHA256SUMS
